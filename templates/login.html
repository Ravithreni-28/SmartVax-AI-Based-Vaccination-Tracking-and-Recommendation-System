{% extends "base.html" %}
{% block title %}Login - SmartVax{% endblock %}
{% block footer %}{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card fade-in-up">
        <div class="auth-header">
            <div class="auth-logo">🔐</div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to your SmartVax account</p>
        </div>
        <div class="auth-body">

            <!-- Demo Credentials -->
            <div class="alert"
                style="background:var(--primary-light);border:1px solid #bfdbfe;border-radius:8px;padding:10px 14px;font-size:0.8rem;margin-bottom:1.25rem;color:var(--primary-dark);">
                <strong>🔑 Demo Admin:</strong> admin@smartvax.com / Admin@1234
            </div>

            <form method="POST" action="{{ url_for('login') }}" id="loginForm">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="form-group">
                    <label class="form-label" for="email"><i class="bi bi-envelope"></i> Email Address</label>
                    <div class="input-icon-wrap">
                        <i class="bi bi-envelope"></i>
                        <input type="email" class="form-control" id="email" name="email" placeholder="your@email.com"
                            autocomplete="username" required autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <label class="form-label mb-0" for="password"><i class="bi bi-lock"></i> Password</label>
                    </div>
                    <div class="input-icon-wrap">
                        <i class="bi bi-lock"></i>
                        <input type="password" class="form-control" id="password" name="password"
                            placeholder="Your password" autocomplete="current-password" required>
                    </div>
                </div>

                <div class="form-group">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember" name="remember">
                        <label class="form-check-label text-muted" for="remember" style="font-size:0.875rem;">
                            Remember me for 2 hours
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn-primary-custom w-100"
                    style="border-radius:10px;padding:13px;margin-top:0.5rem;">
                    <i class="bi bi-box-arrow-in-right"></i> Sign In
                </button>
            </form>

            <hr style="margin: 1.5rem 0;border-color:var(--border);">

            <div class="text-center">
                <p class="text-muted" style="font-size:0.875rem;">
                    Don't have an account? <a href="{{ url_for('register') }}"
                        style="color:var(--primary);font-weight:600;">Register for free</a>
                </p>
                <a href="{{ url_for('index') }}" class="text-muted" style="font-size:0.8rem;">
                    <i class="bi bi-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
