{% extends "base.html" %}
{% block title %}403 - Forbidden{% endblock %}
{% block content %}
<div
    style="min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:3rem 1rem;">
    <div>
        <div style="font-size:5rem;">🔒</div>
        <h1 style="font-size:4rem;font-weight:800;color:var(--danger);">403</h1>
        <h2 style="font-weight:700;margin-bottom:1rem;">Access Denied</h2>
        <p style="color:var(--gray);margin-bottom:2rem;">You don't have permission to access this page.</p>
        <a href="{{ url_for('dashboard') }}" class="btn-primary-custom">
            <i class="bi bi-speedometer2"></i> Go to Dashboard
        </a>
    </div>
</div>
{% endblock %}
