{% extends "base.html" %}
{% block title %}500 - Server Error{% endblock %}
{% block content %}
<div
    style="min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:3rem 1rem;">
    <div>
        <div style="font-size:5rem;">⚠️</div>
        <h1 style="font-size:4rem;font-weight:800;color:var(--warning);">500</h1>
        <h2 style="font-weight:700;margin-bottom:1rem;">Internal Server Error</h2>
        <p style="color:var(--gray);margin-bottom:2rem;">Something went wrong on our end. Please try again later.</p>
        <a href="{{ url_for('index') }}" class="btn-primary-custom">
            <i class="bi bi-arrow-repeat"></i> Try Again
        </a>
    </div>
</div>
{% endblock %}
