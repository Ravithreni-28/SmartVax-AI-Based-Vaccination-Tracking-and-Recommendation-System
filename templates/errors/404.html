{% extends "base.html" %}
{% block title %}404 - Page Not Found{% endblock %}
{% block content %}
<div
    style="min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:3rem 1rem;">
    <div>
        <div style="font-size:5rem;">🔍</div>
        <h1 style="font-size:4rem;font-weight:800;color:var(--primary);">404</h1>
        <h2 style="font-weight:700;margin-bottom:1rem;">Page Not Found</h2>
        <p style="color:var(--gray);margin-bottom:2rem;">The page you're looking for doesn't exist or has been moved.
        </p>
        <a href="{{ url_for('index') }}" class="btn-primary-custom">
            <i class="bi bi-house-fill"></i> Go Home
        </a>
    </div>
</div>
{% endblock %}
